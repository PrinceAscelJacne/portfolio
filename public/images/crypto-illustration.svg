<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07080a"/>
      <stop offset="100%" style="stop-color:#13161c"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e8c97a;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(201,168,76,0.05)" stroke-width="1">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Decorative border -->
  <rect x="20" y="20" width="760" height="410" fill="none" stroke="rgba(201,168,76,0.15)" stroke-width="1"/>
  <rect x="28" y="28" width="744" height="394" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>

  <!-- Ambient glow center -->
  <ellipse cx="400" cy="225" rx="220" ry="120" fill="rgba(201,168,76,0.04)"/>

  <!-- LEFT: Plain text label -->
  <text x="90" y="160" font-family="Georgia, serif" font-size="11" letter-spacing="3" fill="rgba(201,168,76,0.5)" text-anchor="middle">TEXTE CLAIR</text>
  <text x="90" y="190" font-family="Georgia, serif" font-size="22" font-style="italic" fill="rgba(238,234,227,0.9)" text-anchor="middle">BONJOUR</text>
  <text x="90" y="220" font-family="Georgia, serif" font-size="22" font-style="italic" fill="rgba(238,234,227,0.7)" text-anchor="middle">MONDE</text>
  <text x="90" y="250" font-family="Georgia, serif" font-size="22" font-style="italic" fill="rgba(238,234,227,0.5)" text-anchor="middle">CRYPTO</text>
  <!-- underline -->
  <line x1="45" y1="265" x2="135" y2="265" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>

  <!-- ARROW + cipher flow -->
  <g filter="url(#glow)">
    <!-- Arrow line -->
    <line x1="155" y1="225" x2="285" y2="225" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- Arrowhead -->
    <polygon points="285,218 298,225 285,232" fill="#c9a84c" opacity="0.7"/>
    <!-- Moving dots on arrow -->
    <circle cx="185" cy="225" r="2.5" fill="#c9a84c" opacity="0.9"/>
    <circle cx="215" cy="225" r="2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="245" cy="225" r="1.5" fill="#c9a84c" opacity="0.3"/>
  </g>

  <!-- CENTER: Lock / cipher symbol -->
  <g transform="translate(335, 175)">
    <!-- Lock body -->
    <rect x="8" y="28" width="44" height="36" rx="4" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
    <!-- Lock shackle -->
    <path d="M16,28 L16,18 Q30,6 44,18 L44,28" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.8"/>
    <!-- Keyhole -->
    <circle cx="30" cy="44" r="5" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.9"/>
    <line x1="30" y1="49" x2="30" y2="58" stroke="#c9a84c" stroke-width="1.2" opacity="0.9"/>
    <!-- Glow ring -->
    <circle cx="30" cy="44" r="28" fill="none" stroke="rgba(201,168,76,0.1)" stroke-width="8"/>
  </g>

  <!-- Cipher label -->
  <text x="365" y="270" font-family="Georgia, serif" font-size="9" letter-spacing="2.5" fill="rgba(201,168,76,0.5)" text-anchor="middle">CHIFFREMENT</text>
  <text x="365" y="285" font-family="Georgia, serif" font-size="9" letter-spacing="2" fill="rgba(201,168,76,0.4)" text-anchor="middle">POLYALPHABÉTIQUE</text>

  <!-- ARROW right -->
  <g filter="url(#glow)">
    <line x1="400" y1="225" x2="510" y2="225" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <polygon points="510,218 523,225 510,232" fill="#c9a84c" opacity="0.7"/>
    <circle cx="430" cy="225" r="2.5" fill="#c9a84c" opacity="0.9"/>
    <circle cx="460" cy="225" r="2" fill="#c9a84c" opacity="0.6"/>
    <circle cx="490" cy="225" r="1.5" fill="#c9a84c" opacity="0.3"/>
  </g>

  <!-- RIGHT: Encrypted text -->
  <text x="660" y="160" font-family="Georgia, serif" font-size="11" letter-spacing="3" fill="rgba(201,168,76,0.5)" text-anchor="middle">TEXTE CHIFFRÉ</text>
  <text x="660" y="190" font-family="'Courier New', monospace" font-size="20" fill="rgba(201,168,76,0.85)" text-anchor="middle" letter-spacing="4">EQPLMST</text>
  <text x="660" y="220" font-family="'Courier New', monospace" font-size="20" fill="rgba(201,168,76,0.65)" text-anchor="middle" letter-spacing="4">RQPHJ</text>
  <text x="660" y="250" font-family="'Courier New', monospace" font-size="20" fill="rgba(201,168,76,0.45)" text-anchor="middle" letter-spacing="4">GVCTXU</text>
  <line x1="600" y1="265" x2="720" y2="265" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="400" y="400" font-family="Georgia, serif" font-size="10" letter-spacing="5" fill="rgba(201,168,76,0.25)" text-anchor="middle">CRYPTO · PYTHON &amp; C++ · CHIFFREMENT DE MESSAGES</text>

  <!-- Corner marks -->
  <text x="36" y="44" font-family="'Courier New', monospace" font-size="9" fill="rgba(201,168,76,0.3)" letter-spacing="1">01</text>
  <text x="748" y="44" font-family="'Courier New', monospace" font-size="9" fill="rgba(201,168,76,0.3)" text-anchor="end" letter-spacing="1">CIPHER</text>
</svg>
