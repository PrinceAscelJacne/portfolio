<svg viewBox="0 0 460 258" xmlns="http://www.w3.org/2000/svg" style="background:#0e1015">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e1015" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="230" cy="129" rx="180" ry="100" fill="url(#glow)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="64" x2="460" y2="64" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="129" x2="460" y2="129" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="194" x2="460" y2="194" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="115" y1="0" x2="115" y2="258" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="230" y1="0" x2="230" y2="258" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="345" y1="0" x2="345" y2="258" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Main card / questionnaire UI -->
  <rect x="80" y="34" width="300" height="190" rx="2" fill="#13161c" stroke="#c9a84c" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Card header -->
  <rect x="80" y="34" width="300" height="32" rx="2" fill="#c9a84c" fill-opacity="0.08"/>
  <text x="96" y="54" font-family="monospace" font-size="9" fill="#c9a84c" letter-spacing="2" opacity="0.9">QUESTIONNAIRE · MODE TEST</text>
  <!-- dots -->
  <circle cx="348" cy="50" r="4" fill="#c9a84c" opacity="0.6"/>
  <circle cx="360" cy="50" r="4" fill="#c9a84c" opacity="0.3"/>
  <circle cx="372" cy="50" r="4" fill="#c9a84c" opacity="0.15"/>

  <!-- Question label -->
  <text x="96" y="84" font-family="monospace" font-size="7" fill="#7a7570" letter-spacing="1">QUESTION 02 / 05</text>
  <!-- Progress bar -->
  <rect x="96" y="90" width="268" height="2" rx="1" fill="#ffffff" fill-opacity="0.05"/>
  <rect x="96" y="90" width="107" height="2" rx="1" fill="#c9a84c" opacity="0.6"/>

  <!-- Question text -->
  <text x="96" y="112" font-family="monospace" font-size="10" fill="#eeeae3" font-weight="bold">Quel est le rôle d'un</text>
  <text x="96" y="126" font-family="monospace" font-size="10" fill="#eeeae3" font-weight="bold">constructeur en C++ ?</text>

  <!-- Separator -->
  <line x1="96" y1="136" x2="364" y2="136" stroke="#c9a84c" stroke-opacity="0.1" stroke-width="1"/>

  <!-- QCM Options -->
  <!-- Option A - selected -->
  <rect x="96" y="144" width="268" height="20" rx="1" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-opacity="0.4" stroke-width="1"/>
  <text x="104" y="158" font-family="monospace" font-size="8" fill="#c9a84c">A</text>
  <text x="118" y="158" font-family="monospace" font-size="8" fill="#eeeae3">Initialiser les attributs d'un objet</text>

  <!-- Option B -->
  <rect x="96" y="168" width="268" height="20" rx="1" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="104" y="182" font-family="monospace" font-size="8" fill="#7a7570">B</text>
  <text x="118" y="182" font-family="monospace" font-size="8" fill="#7a7570">Détruire un objet en mémoire</text>

  <!-- Option C -->
  <rect x="96" y="192" width="268" height="20" rx="1" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="104" y="206" font-family="monospace" font-size="8" fill="#7a7570">C</text>
  <text x="118" y="206" font-family="monospace" font-size="8" fill="#7a7570">Copier la valeur d'une variable</text>

  <!-- Bottom bar -->
  <rect x="80" y="204" width="300" height="20" rx="1" fill="#c9a84c" fill-opacity="0.05"/>
  <text x="96" y="218" font-family="monospace" font-size="7" fill="#7a7570" letter-spacing="1">C++  ·  FICHIER  ·  ADAPTATIF</text>
  <text x="328" y="218" font-family="monospace" font-size="7" fill="#c9a84c" letter-spacing="1">SUIVANT →</text>

  <!-- Decorative corner marks -->
  <path d="M20,20 L40,20 L40,22 L22,22 L22,40 L20,40 Z" fill="#c9a84c" opacity="0.2"/>
  <path d="M440,20 L420,20 L420,22 L438,22 L438,40 L440,40 Z" fill="#c9a84c" opacity="0.2"/>
  <path d="M20,238 L40,238 L40,236 L22,236 L22,218 L20,218 Z" fill="#c9a84c" opacity="0.2"/>
  <path d="M440,238 L420,238 L420,236 L438,236 L438,218 L440,218 Z" fill="#c9a84c" opacity="0.2"/>

  <!-- Label bottom left -->
  <text x="22" y="252" font-family="monospace" font-size="7" fill="#c9a84c" opacity="0.4" letter-spacing="1">QUESTIONNAIRE-CPP</text>
  <text x="380" y="252" font-family="monospace" font-size="7" fill="#7a7570" opacity="0.5">github</text>
</svg>
